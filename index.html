<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster session vote</title>
<style>
  :root {
    --surface-2: #f4f4f5;
    --border: #e4e4e7;
    --bg-accent: #eff6ff;
    --fill-accent: #3b82f6;
    --text-primary: #18181b;
    --text-secondary: #52525b;
    --text-muted: #a1a1aa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-2: #27272a;
      --border: #3f3f46;
      --bg-accent: #1e3a5f;
      --fill-accent: #60a5fa;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: transparent;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .container { max-width: 860px; margin: 0 auto; }

  header { margin-bottom: 28px; }
  header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  header p  { font-size: 14px; color: var(--text-secondary); }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .counter { font-weight: 600; color: var(--text-primary); }
  .link-btn {
    background: none;
    border: none;
    color: var(--fill-accent);
    cursor: pointer;
    font-size: 13px;
    padding: 0;
    text-decoration: underline;
  }
  .link-btn:hover { opacity: 0.8; }

  /* Poster grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .card {
    background: var(--surface-2);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 14px 14px 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s, opacity .15s;
    user-select: none;
  }
  .card:hover:not(.disabled):not(.selected) {
    border-color: var(--fill-accent);
    opacity: .9;
  }
  .card.selected {
    border-color: var(--fill-accent);
    background: var(--bg-accent);
  }
  .card.disabled {
    opacity: .45;
    cursor: not-allowed;
  }
  .card-num {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 5px;
    font-variant-numeric: tabular-nums;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
    color: var(--text-primary);
  }
  .card-author {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Submit */
  .submit-wrap { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .btn-submit {
    background: var(--fill-accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px 28px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-submit:disabled { opacity: .4; cursor: not-allowed; }
  .btn-submit:not(:disabled):hover { opacity: .88; }

  /* Thank-you / results */
  .thankyou {
    text-align: center;
    padding: 32px 0 20px;
    margin-bottom: 28px;
  }
  .thankyou h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .thankyou p  { font-size: 14px; color: var(--text-secondary); }

  /* Bar chart */
  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .results-header h2 { font-size: 17px; font-weight: 700; }
  .total-votes { font-size: 13px; color: var(--text-muted); }

  .chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .bar-label {
    width: 200px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-secondary);
    line-height: 1.3;
  }
  .bar-label .medal { margin-right: 4px; }
  .bar-track {
    flex: 1;
    background: var(--surface-2);
    border-radius: 4px;
    height: 26px;
    position: relative;
    overflow: visible;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--fill-accent);
    transition: width .4s ease;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 6px;
    position: relative;
  }
  .bar-count-inside {
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
  }
  .bar-count-outside {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    position: absolute;
    left: calc(100% + 6px);
    white-space: nowrap;
  }

  .back-link { margin-top: 24px; text-align: center; }

  /* Utility */
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">

  <!-- VOTE VIEW -->
  <div id="view-vote">
    <header>
      <h1>Poster session vote</h1>
      <p>Select your 3 favorite posters, then submit your vote.</p>
    </header>

    <div class="status-bar">
      <span>Selected: <span class="counter" id="selected-count">0</span> / 3</span>
      <button class="link-btn" id="btn-see-results">View current results</button>
    </div>

    <div class="grid" id="poster-grid"></div>

    <div class="submit-wrap">
      <button class="btn-submit" id="btn-submit" disabled>Submit vote</button>
    </div>
  </div>

  <!-- THANK-YOU VIEW -->
  <div id="view-done" class="hidden">
    <div class="thankyou">
      <h2>Thank you for voting!</h2>
      <p>Your selections have been recorded. Live results are shown below.</p>
    </div>
    <div id="chart-done"></div>
  </div>

  <!-- RESULTS-ONLY VIEW -->
  <div id="view-results" class="hidden">
    <header>
      <h1>Poster session results</h1>
      <p>Live vote tallies — updates each time you refresh.</p>
    </header>
    <div id="chart-results"></div>
    <div class="back-link">
      <button class="link-btn" id="btn-back-to-vote">← Back to vote</button>
    </div>
  </div>

</div>
<script>
// ─── Poster data ────────────────────────────────────────────────────────────
// Edit this array to swap in real poster data.
const POSTERS = [
  { id:  1, title: "No Atoms, No Chemistry? Dalton's Chemistry Just Before Atomic Theory",                                                                                                                   author: "Ana Maria Possamai" },
  { id:  2, title: "A Philosophical Approach to Rare Diseases",                                                                                                                                              author: "Anne Fenoy" },
  { id:  3, title: "Causal Process Modelling for Better Evaluation and Planning",                                                                                                                            author: "Brendan Kelters" },
  { id:  4, title: "Can science education really remove superstitions?",                                                                                                                                     author: "Deepika Bansal" },
  { id:  5, title: "Investigating Population Health through a Performative Lens",                                                                                                                            author: "Elena Popa" },
  { id:  6, title: "Effects of incorporating scientific uncertainty into undergraduate STEM classes",                                                                                                         author: "Elizabeth Coody" },
  { id:  7, title: "Integrating HPS: Leveraging Complementary Science in the analysis of hydrogen-forming enzymes",                                                                                         author: "Florian Riemer" },
  { id:  8, title: "Fostering integration across the diverse methodological landscape of human behaviour research",                                                                                          author: "Ingo Brigandt" },
  { id:  9, title: "Authority, legitimacy, and the role of the researcher in adapting and validating protocols: an epistemological analysis",                                                               author: "Ingrid Lamminpää" },
  { id: 10, title: "Bias and Expertise: Think tank framing in Canadian news media",                                                                                                                          author: "Jacob Hamel-Mottiez" },
  { id: 11, title: "Social science, metaethics and public policy: Conceptual problems in the \"turn to values\"",                                                                                            author: "Keryn Hassall" },
  { id: 12, title: "The teratological blindspot: challenges for a philosophical understanding of normativity in the developmental study of malformations and synthetic embryos",                             author: "Leyre Celada-Marcén" },
  { id: 13, title: "Redefining Fitness for Purpose: lessons from fusion energy systems design",                                                                                                              author: "Marc Raguz" },
  { id: 14, title: "A Blind Morphism from the Iteration of Multimodal Determination and Model Design",                                                                                                      author: "Mario Chalita" },
  { id: 15, title: "From Stories to Epistemology: Preservice Teachers' NOS Ideas Informed by Scientists with Disabilities' Narratives",                                                                    author: "Mila Rosa Librea-Carden" },
  { id: 16, title: "A Proposed Linguistic Turn in Philosophy of Science",                                                                                                                                    author: "Monika Rydzewski" },
  { id: 17, title: "Is Cognition Low-Dimensional?",                                                                                                                                                         author: "Phillip Kieval" },
  { id: 18, title: "Reconnecting \"Science Practices\": What Science Education Can Learn from Philosophy of Science in Practice",                                                                            author: "Ron Gray" },
  { id: 19, title: "An Ethnomethodological Demystification of the Algorithmic",                                                                                                                             author: "Sabreen Syeed" },
  { id: 20, title: "Is PSP bound to ontological pluralism, and what does it entail? A metaphysical discussion in the context of an inquiry with biologists",                                                author: "Sélène Domino" },
  { id: 21, title: "How can an integrated history and philosophy of science help in the context of the debate between new mechanism and processual ontology? The relevance of the other biological synthesis of Julian S. Huxley (1887–1975)", author: "Stefan Bernhardt-Radu" },
  { id: 22, title: "Menarche, Menopause, and Missing Male Markers: Gendered Kinds in the Classification of Age",                                                                                            author: "Tashmia Sabera" },
  { id: 23, title: "Toward a Unified Approach to Philosophy of Science and Clinical Research Ethics: The Values-in-Science Standard and the Social Value Requirement",                                      author: "Ukyo Shimizu" },
  { id: 24, title: "On synthetic medical data: values hierarchies, reification, and zombies",                                                                                                               author: "Yael Friedman" },
  { id: 25, title: "An Enactive Account of Scientific Models and Representations",                                                                                                                          author: "Yuyou Wu" },
  { id: 26, title: "Clusters and Clustering: Natural Kinds Meet Statistical Practice",                                                                                                                      author: "Zina Ward" },
];

const MAX_VOTES = 3;
const SHARED_KEY = 'poster-votes-data';
const VOTED_KEY  = 'poster-has-voted';

// ─── State ──────────────────────────────────────────────────────────────────
let selected  = new Set();   // ids chosen this session
let voteCounts = {};         // { id: count }
let hasVoted  = false;

// ─── Init ────────────────────────────────────────────────────────────────────
POSTERS.forEach(p => voteCounts[p.id] = 0);

async function init() {
  // Load shared vote tallies
  try {
    const r = await window.storage.get(SHARED_KEY, true);
    if (r && r.value) {
      const stored = JSON.parse(r.value);
      POSTERS.forEach(p => { voteCounts[p.id] = stored[p.id] || 0; });
    }
  } catch (_) {}

  // Load per-device voted flag
  try {
    const r = await window.storage.get(VOTED_KEY, false);
    if (r && r.value === '1') hasVoted = true;
  } catch (_) {}

  if (hasVoted) {
    showDone();
  } else {
    buildGrid();
    showView('vote');
  }
}

// ─── Grid ────────────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('poster-grid');
  grid.innerHTML = '';
  POSTERS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = p.id;
    card.innerHTML = `
      <div class="card-num">Poster ${p.id}</div>
      <div class="card-title">${esc(p.title)}</div>
      <div class="card-author">${esc(p.author)}</div>
    `;
    card.addEventListener('click', () => toggleCard(p.id));
    grid.appendChild(card);
  });
  refreshGrid();
}

function toggleCard(id) {
  if (selected.has(id)) {
    selected.delete(id);
  } else {
    if (selected.size >= MAX_VOTES) return;
    selected.add(id);
  }
  refreshGrid();
}

function refreshGrid() {
  const full = selected.size >= MAX_VOTES;
  document.querySelectorAll('.card').forEach(card => {
    const id = +card.dataset.id;
    const isSel = selected.has(id);
    card.classList.toggle('selected', isSel);
    card.classList.toggle('disabled', full && !isSel);
  });
  document.getElementById('selected-count').textContent = selected.size;
  document.getElementById('btn-submit').disabled = selected.size !== MAX_VOTES;
}

// ─── Submit ──────────────────────────────────────────────────────────────────
document.getElementById('btn-submit').addEventListener('click', async () => {
  if (selected.size !== MAX_VOTES) return;

  // Reload shared counts first (another voter may have gone ahead)
  try {
    const r = await window.storage.get(SHARED_KEY, true);
    if (r && r.value) {
      const fresh = JSON.parse(r.value);
      POSTERS.forEach(p => { voteCounts[p.id] = fresh[p.id] || 0; });
    }
  } catch (_) {}

  selected.forEach(id => { voteCounts[id] = (voteCounts[id] || 0) + 1; });

  try {
    await window.storage.set(SHARED_KEY, JSON.stringify(voteCounts), true);
  } catch (_) {}
  try {
    await window.storage.set(VOTED_KEY, '1', false);
  } catch (_) {}

  hasVoted = true;
  showDone();
});

// ─── Views ───────────────────────────────────────────────────────────────────
function showView(name) {
  ['vote','done','results'].forEach(v =>
    document.getElementById(`view-${v}`).classList.toggle('hidden', v !== name));
}

function showDone() {
  renderChart('chart-done');
  showView('done');
}

document.getElementById('btn-see-results').addEventListener('click', () => {
  renderChart('chart-results');
  showView('results');
});

document.getElementById('btn-back-to-vote').addEventListener('click', () => {
  if (hasVoted) { showDone(); } else { showView('vote'); }
});

// ─── Chart ───────────────────────────────────────────────────────────────────
function renderChart(containerId) {
  const container = document.getElementById(containerId);
  const medals = ['🥇','🥈','🥉'];

  const sorted = [...POSTERS]
    .map(p => ({ ...p, votes: voteCounts[p.id] || 0 }))
    .sort((a, b) => b.votes - a.votes || a.id - b.id);

  const maxVotes = sorted[0]?.votes || 0;
  const totalVotes = Object.values(voteCounts).reduce((s, v) => s + v, 0);

  container.innerHTML = `
    <div class="results-header">
      <h2>Current standings</h2>
      <span class="total-votes">${totalVotes} vote${totalVotes !== 1 ? 's' : ''} cast</span>
    </div>
    <div class="chart">
      ${sorted.map((p, i) => {
        const pct = maxVotes > 0 ? (p.votes / maxVotes) * 100 : 0;
        const medal = i < 3 && p.votes > 0 ? `<span class="medal">${medals[i]}</span>` : '';
        const showInside = pct >= 12 && p.votes > 0;
        return `
          <div class="bar-row">
            <div class="bar-label" title="${esc(p.author)}">${medal}${esc(p.author)}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%">
                ${showInside ? `<span class="bar-count-inside">${p.votes}</span>` : ''}
                ${!showInside ? `<span class="bar-count-outside">${p.votes > 0 ? p.votes : ''}</span>` : ''}
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

// ─── Util ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
